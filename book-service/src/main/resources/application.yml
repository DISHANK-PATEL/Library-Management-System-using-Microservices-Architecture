server:
  port: 8081

spring:
  sql:
    init:
      mode: always

  application:
    name: book-service

  config:
    import: optional:configserver:http://localhost:8888

  # Local database defaults — overridden by Config Server in Docker.
  datasource:
    url: jdbc:mysql://localhost:3306/book_db?createDatabaseIfNotExist=true
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health
