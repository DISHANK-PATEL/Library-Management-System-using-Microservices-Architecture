server:
  port: 8081

spring:
  application:
    name: book-service

  # Config Server import — at startup, this service calls Config Server
  # to fetch book-service.yml from the Git repo. 'optional:' means
  config:
    import: optional:configserver:http://localhost:8888

  # Local database defaults — overridden by Config Server in Docker.
  datasource:
    url: jdbc:mysql://localhost:3306/book_db?createDatabaseIfNotExist=true
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Tracing: send 100% of spans to Zipkin (dev setting)
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: health
