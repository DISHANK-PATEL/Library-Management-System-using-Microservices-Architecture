server:
  port: 8084

spring:
  application:
    name: fine-service

  cloud:
    openfeign:
      okhttp:
        enabled: true

  config:
    import: optional:configserver:http://localhost:8888

  datasource:
    url: jdbc:mysql://localhost:3306/fine_db?createDatabaseIfNotExist=true
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: admin
    password: admin
    listener:
      simple:
        observation-enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

fine:
  rate-per-day: 2.00

management:
  tracing:
    sampling:
      probability: 1.0
    zipkin:
      endpoint: http://localhost:9411/api/v2/spans

  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers,trace

  metrics:
    tags:
      application: fine-service

logging:
  pattern:
    level: "%5p [${spring.application.name:},traceId=%X{traceId:-},spanId=%X{spanId:-}]"