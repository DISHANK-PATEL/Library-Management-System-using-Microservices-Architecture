server:
  port: 8080  # External Clients ko sirf isse matlab he

spring:
  application:
    name: api-gateway

  config:
    import: optional:configserver:http://localhost:8888

  cloud:
    gateway:
      routes:
        - id: book-service
          uri: lb://book-service
          predicates:
            - Path=/api/v1/books/**, /api/v1/internal/books/**

        - id: member-service
          uri: lb://member-service
          predicates:
            - Path=/api/v1/members/**, /api/v1/internal/members/**

        - id: loan-service
          uri: lb://loan-service
          predicates:
            - Path=/api/v1/loans/**,/api/v1/internal/loans/**

        - id: fine-service
          uri: lb://fine-service
          predicates:
            - Path=/api/v1/fines/**

      discovery:
        locator:
          enabled: false

# Eureka client config
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health, gateway
